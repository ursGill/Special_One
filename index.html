<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Special_One</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #ffd1dc, #ff6f91);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: #4b0033;
    }

    .container {
        text-align: center;
        padding: 20px;
        max-width: 500px;
        width: 100%;
        z-index: 10;
    }

    .bear {
        font-size: 3rem;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }

    h1 {
        font-family: 'Dancing Script', cursive;
        font-size: 2.5rem;
        margin: 20px 0 10px;
    }

    .subtitle {
        font-style: italic;
        margin-bottom: 20px;
    }

    .closing {
        margin-top: 15px;
        font-size: 0.95rem;
    }

    .buttons {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

@media (min-width: 480px) {
    .buttons {
        flex-direction: row;
        gap: 40px;
    }
}


    .yes-btn {
        background: linear-gradient(135deg, #ff2f68, #ff5f8f);
        color: white;
        border: none;
        padding: 15px 35px;
        font-size: 1.2rem;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255, 47, 104, 0.6);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .yes-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(255, 47, 104, 0.9);
    }

    .no-btn {
    background: white;
    color: #ff2f68;
    border: 2px solid #ff2f68;
    padding: 12px 28px;
    font-size: 1rem;
    border-radius: 999px;
    cursor: pointer;
    position: relative; /* IMPORTANT */
}


    /* Floating Hearts */
    .heart {
        position: fixed;
        bottom: -50px;
        animation: floatUp linear infinite;
        opacity: 0;
        pointer-events: none;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(0);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        90% {
            opacity: 1;
        }
        100% {
            transform: translateY(-110vh);
            opacity: 0;
        }
    }

    /* Celebration Screen */
    .celebration {
        display: none;
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
        text-align: center;
    }

    .yay {
        font-size: 4rem;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
    }

    .spin {
        font-size: 3rem;
        animation: spin 2s linear infinite;
        margin: 15px 0;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Confetti */
    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        background-color: red;
        animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
        from {
            transform: translateY(-20px) rotate(0deg);
            opacity: 1;
        }
        to {
            transform: translateY(110vh) rotate(720deg);
            opacity: 0;
        }
    }
</style>
</head>
   
<body>

<div class="container" id="questionBox">
    <div class="bear">🧸</div>
    <h1>Will You Be My ,  <span id="valName">My Love</span>?</h1>
    <div class="subtitle">I've been gathering courage to ask you this...</div>
    <div class="closing">
        Every love story is beautiful, but ours is my favourite
    </div>

    <div class="buttons">
        <button class="yes-btn" id="yesBtn">Yes ❤️</button>
        <button class="no-btn" id="noBtn">No</button>
    </div>
</div>

<div class="celebration" id="celebration">
    <div class="yay">Yayyyy!! 💖</div>
    <div class="spin">😍</div>
    <p style="font-size:1.2rem;">I knew you'd say yes...</p>
</div>

<script>
    /* Floating Hearts */
    const heartCount = 15;
    let heartsActive = true;
    const params = new URLSearchParams(window.location.search);
const nameFromURL = params.get("name");

if (nameFromURL) {
    const safeName = nameFromURL.replace(/[^a-zA-Z\s]/g, "");
    document.getElementById("valName").textContent = safeName;
}


    function createHeart() {
        if (!heartsActive) return;

        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = '❤️';

        const size = Math.random() * 20 + 15;
        const left = Math.random() * 100;
        const duration = Math.random() * 5 + 5;

        heart.style.fontSize = size + 'px';
        heart.style.left = left + 'vw';
        heart.style.animationDuration = duration + 's';

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), duration * 1000);
    }

    setInterval(() => {
        if (document.querySelectorAll('.heart').length < heartCount) {
            createHeart();
        }
    }, 500);

    /* No Button Logic */
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');

    const messages = [
        "Nope, not an option!",
        "Try again!",
        "You sure about that?",
        "Not happening!",
        "Think again!"
    ];
    let msgIndex = 0;

    function moveNoButton() {
    const yesRect = yesBtn.getBoundingClientRect();
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    // Switch to fixed ONLY when moving
    noBtn.style.position = 'fixed';

    let x, y, overlap;

    do {
        x = Math.random() * (window.innerWidth - btnWidth - 10);
        y = Math.random() * (window.innerHeight - btnHeight - 10);

        overlap =
            x < yesRect.right &&
            x + btnWidth > yesRect.left &&
            y < yesRect.bottom &&
            y + btnHeight > yesRect.top;
    } while (overlap);

    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    noBtn.textContent = messages[msgIndex];
    msgIndex = (msgIndex + 1) % messages.length;
}


    noBtn.addEventListener('pointerdown', moveNoButton);


    /* Yes Button */
    yesBtn.addEventListener('click', () => {
       const music = document.getElementById('bgMusic');
    music.volume = 0.6;
    music.play().catch(() => {});
        document.getElementById('questionBox').style.display = 'none';
        noBtn.style.display = 'none';
        heartsActive = false;
        document.querySelectorAll('.heart').forEach(h => h.remove());

        const celebration = document.getElementById('celebration');
        celebration.style.display = 'flex';

        // Confetti
        for (let i = 0; i < 120; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';

            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor =
                `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';

            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
        }
    });
</script>
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
    Your browser does not support audio.
</audio>

</body>
</html>
